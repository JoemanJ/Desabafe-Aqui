<div class="bubble-container">
    <!-- TODO: make buttons active only when all fields are filled -->
    <!-- TODO: validate input on frontend side -->
    <div class="login bubble">
        <h3 class="standart-font">Olá de novo!</h3>
        <input type="text" placeholder="Usuário" class="text-input" #login_user_field>
        <input type="password" placeholder="Senha" class="text-input" #login_password_field>
        <app-rounded-button (click)="login(login_user_field.value, login_password_field.value)" class="rounded-button standart-font">Entrar</app-rounded-button>
        @if(loginErrorMessage()) {
            <p class="error-message standart-font">{{loginErrorMessage()}}</p>
        }
        <!-- TODO: link (and page) to recover account" -->
    </div>
</div>
<div class="bubble-container">
    <div class="register bubble">
        <h3 class="standart-font">Primeira vez?</h3>
        <input type="text" placeholder="Usuário" class="text-input" #register_user_field>
        <input type="text" placeholder="Email" class="text-input" #register_email_field>
        <input type="password" placeholder="Senha" class="text-input" #register_password_field>
        <input type="password" placeholder="Confirmar senha" class="text-input" #register_confirm_password_field>
        <app-rounded-button (click)="register(register_user_field.value,
                                                                       register_email_field.value,
                                                                       register_password_field.value,
                                                                       register_confirm_password_field.value
        )">Registrar</app-rounded-button>
        @if(registerErrorMessage()) {
            <p class="error-message standart-font">{{registerErrorMessage()}}</p>
        }
    </div>
</div>
