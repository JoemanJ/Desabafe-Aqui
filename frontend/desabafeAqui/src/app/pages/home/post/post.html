<div class="post" (click)="debug()" [ngClass]="{ 'own': username()===currentUser,}">

        <img [src]="user_profile_picture()">
        <h2 class="username">@{{username()}}</h2>
    </div>
    <p class="text standart-font">
        {{text()}}
    </p>
</div>
